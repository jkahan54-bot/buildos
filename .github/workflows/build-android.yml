name: Build Android APK

on:
  workflow_dispatch:   # manual trigger only — runs when you start it from the GitHub UI
  # Automatic build-on-push is disabled for now (the Android/Expo build was failing
  # and emailing failures on every push). The website is built separately by Vercel
  # and is unaffected. To re-enable automatic Android builds later, uncomment below:
  # push:
  #   branches: [main]
  #   paths: ['mobile/**']

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        working-directory: mobile
        run: npm install

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Build Android APK
        working-directory: mobile
        run: eas build --platform android --profile preview --non-interactive

      - name: Get APK download URL
        working-directory: mobile
        run: |
          URL=$(eas build:list --platform android --status finished --limit 1 --json --non-interactive | node -e "const d=JSON.parse(require('fs').readFileSync('/dev/stdin','utf8'));console.log(d[0]?.artifacts?.buildUrl||'pending')")
          echo "APK URL: $URL"
          echo "apk_url=$URL" >> $GITHUB_OUTPUT
        id: apk
